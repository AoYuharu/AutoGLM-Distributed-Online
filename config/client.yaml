client:
  server:
    ws_url: "ws://localhost:8000"
    http_base_url: "http://localhost:8000"

  logging:
    level: "INFO"

  polling:
    interval_seconds: 3

  websocket:
    max_reconnect_attempts: 10
    reconnect_base_delay_seconds: 1
    reconnect_max_delay_seconds: 60
    send_ack_timeout_seconds: 10

  http:
    timeout_seconds: 30
    observe_retry_attempts: 1

  platforms:
    adb:
      enabled: true
      binary: "adb"

    hdc:
      enabled: false
      binary: "hdc"

    wda:
      enabled: false
      default_url: "http://localhost:8100"
      session_timeout_seconds: 300
