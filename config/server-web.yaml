server:
  public_base_url: "http://localhost:8000"
  websocket_public_url: "ws://localhost:8000"

  host: "0.0.0.0"
  port: 8000
  debug: true

  database_url: "sqlite:///./data/autoglm.db"
  storage_path: "./data/storage"
  cors_origins: "*"

  websocket:
    heartbeat_interval: 30
    heartbeat_timeout: 90
    max_connections: 10000

  react:
    core_threads: 4
    max_threads: 8
    reason_timeout: 30
    ai_timeout: 10
    ai_max_retries: 3
    ack_max_retries: 3
    ack_retry_interval: 15
    ack_timeout: 15
    observe_timeout: 30
    max_observe_error_retries: 2

  ai:
    base_url: "https://open.bigmodel.cn/api/paas/v4"
    api_key: "EMPTY"
    model: "autoglm-phone"
    timeout: 120

  logging:
    level: "INFO"
    file: "./logs/server.log"
    max_bytes: 10485760
    backup_count: 5

  jwt:
    secret: "your-secret-key-change-in-production"
    algorithm: "HS256"
    expire_hours: 24
